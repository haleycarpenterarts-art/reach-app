name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel superseded in-flight runs for the same branch / PR.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Typecheck · Lint · Test · Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci
        # postinstall runs `prisma generate` automatically.

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test -- --run

      - name: Next build
        run: npm run build
        env:
          # Dummy values: build does not connect to DB or Supabase.
          # Real secrets are injected by Vercel for deploys, not CI.
          DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"
          DIRECT_URL: "postgresql://dummy:dummy@localhost:5432/dummy"
          NEXT_PUBLIC_SUPABASE_URL: "https://dummy.supabase.co"
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: "dummy_publishable_key"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "dummy_anon_key"
          SUPABASE_SERVICE_ROLE_KEY: "dummy_service_role_key"
